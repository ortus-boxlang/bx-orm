name: Test Suites

# We are a reusable Workflow only
on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

env:
  MODULE_ID: ${{ github.event.repository.name }}
  GRADLE_VERSION: 8.14.1

jobs:
  tests:
    name: "OS: ${{ matrix.os }} with JDK: ${{ matrix.jdkVersion }}, Exp: ${{ matrix.experimental }}"
    runs-on: ${{ matrix.os }}
    env:
      DB_USER: root
      DB_PASSWORD: root
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"] # "windows-latest"
        jdkVersion: ["21"]
        boxlangVersion: [ "1.11.0" ]
        experimental: [false]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.jdkVersion }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Setup Database and Fixtures
        run: |
          sudo systemctl start mysql.service
          mysql -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD }} -e "set global sql_mode='STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION';"
          mysql -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD }} -e 'CREATE DATABASE test;'
          mysql -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD }} -e 'CREATE DATABASE dsn2;'

      - name: Test Module
        run: |
          gradle installModuleDependencies --stacktrace --console=plain -PboxlangVersion="${{ matrix.boxlangVersion }}"
          # this is done in order to build the module structure before testing
          gradle shadowJar test --stacktrace --console=plain -PboxlangVersion="${{ matrix.boxlangVersion }}"

      - name: Publish Test Reports
        uses: mikepenz/action-junit-report@v6.3.0
        if: always()
        with:
          report_paths: |
            **/build/test-results/test/*.xml
            **/surefire-reports/*.xml
            **/failsafe-reports/*.xml
          check_name: "JUnit Report ${{ matrix.os }}-${{ matrix.jdkVersion }}"
          include_passed: false
          fail_on_failure: true
          summary: "Test Results for ${{ matrix.os }} on JDK ${{ matrix.jdkVersion }}"
          detailed_summary: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tests-${{ matrix.os }}-${{ matrix.jdkVersion }}
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

      - name: Inform Slack
        if: ${{ !matrix.experimental && failure() && github.ref == 'refs/heads/development' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: boxlang
          SLACK_COLOR: ${{ job.status }} # or a specific color like 'green' or '#ff00ff'
          SLACK_ICON_EMOJI: ":bell:"
          SLACK_MESSAGE: "${{ env.MODULE_ID }} Tests FAILED!  You broke the build! :("
          SLACK_TITLE: "${{ env.MODULE_ID }} Build Failure"
          SLACK_USERNAME: CI
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          MSG_MINIMAL: true
